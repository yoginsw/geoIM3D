name: Build geoIM3D MSIX

# Manually builds the Windows MSIX package and uploads it as a workflow artifact.
# Store submission remains blocked until JBT Partner Center Name/Publisher values
# are approved and injected explicitly during the Release phase.

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: Partner Center Package Identity Name
        required: true
        type: string
      publisher:
        description: Partner Center Publisher ID (CN=...)
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build MSIX
    runs-on: windows-2025
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri release binary
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_GEE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GEE_OAUTH_CLIENT_ID }}
          GEOLIBRE_PGLITE_CDN: "0"
          GEOLIBRE_CEREUS_CDN: "0"
        run: npm run tauri:build -- --no-sign

      - name: Build MSIX package
        id: build_msix
        shell: pwsh
        env:
          PARTNER_PACKAGE_NAME: ${{ inputs.package_name }}
          PARTNER_PUBLISHER: ${{ inputs.publisher }}
        run: |
          ./packaging/msix/build-msix.ps1 `
            -Name $env:PARTNER_PACKAGE_NAME `
            -Publisher $env:PARTNER_PUBLISHER `
            -PublisherDisplayName 'JBT' `
            -DisplayName 'geoIM3D'

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: geoim3d-store-unsigned-msix
          path: ${{ steps.build_msix.outputs.msix_path }}
          if-no-files-found: error
          retention-days: 7
