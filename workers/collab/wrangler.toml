name = "geolibre-collab"
main = "src/index.ts"
compatibility_date = "2025-03-01"

# Local `wrangler dev` only; do not create a public workers.dev endpoint.
workers_dev = false

# Each live session is one Durable Object instance (addressed by its session
# code via idFromName), so all participants' sockets land on the same actor and
# can be fanned out to.
[[durable_objects.bindings]]
name = "COLLAB_SESSION"
class_name = "CollabSession"

# SQLite-backed Durable Object: cheaper, and required for the WebSocket
# Hibernation API used to keep idle sessions' sockets open without holding the
# actor in memory.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollabSession"]
